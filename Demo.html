<demo html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-bottom: 20px; color: #38bdf8; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            color: #0f172a;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background: #0ea5e9; }
        .error-msg {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Enter Password</h2>
        <input type="password" id="passwordField" placeholder="Enter the secret password...">
        <button onclick="checkPassword()">Access Website</button>
        <div id="error" class="error-msg">Incorrect password. Access Denied!</div>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById("passwordField").value;
            const errorDiv = document.getElementById("error");

            // CHANGE YOUR PASSWORD HERE
            const correctPassword = "0000";

            if (password === correctPassword) {
                // If correct, take them to the secret webpage
                window.location.href = "Demo1.html";
            } else {
                // If wrong, reveal the error message
                errorDiv.style.display = "block";
            }
        }
    </script>

</body>
</html>
